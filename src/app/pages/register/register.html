<div class="auth-container">
  <div class="auth-card">
    <h2>הרשמה למערכת</h2>
    <form (ngSubmit)="onSubmit()" #f="ngForm">
      <div class="form-group">
        <label>שם מלא</label>
        <input type="text" [(ngModel)]="fullName" name="fullName" required />
      </div>
      <div class="form-group">
        <label>שם משתמש</label>
        <input type="text" [(ngModel)]="username" name="username" required />
      </div>
      <div class="form-group">
        <label>סיסמה</label>
        <input type="password" [(ngModel)]="password" name="password" required />
      </div>
      <div class="form-group">
        <label>אימות סיסמה</label>
        <input type="password" [(ngModel)]="passwordVerify" name="passwordVerify" required />
      </div>
      @if (error) {
      <div class="error">{{ error }}</div>
      }
      <button type="submit" class="btn-primary">הרשמה</button>
    </form>
    <p class="link">יש לך חשבון? <a routerLink="/login">כניסה</a></p>
  </div>
</div>
