<div class="page" dir="rtl">
  <h2>הטיולים שלי</h2>

  <div class="trips-grid">
    @for (trip of myTrips; track trip.id) {
    <div class="trip-card">
      <img [src]="trip.image" [alt]="trip.name" />
      <div class="trip-info">
        <h3>{{ trip.name }}</h3>
        <p class="destination">📍 {{ trip.destination }}</p>
        <p class="price">₪{{ trip.price }}</p>
      </div>
      <div class="trip-actions">
        <button class="btn-view" (click)="viewTrip(trip.id)">צפה בטיול</button>
      </div>
    </div>
    }
  </div>

  @if (myTrips.length === 0) {
  <p class="empty">לא נרשמת לאף טיול עדיין</p>
  }
</div>
